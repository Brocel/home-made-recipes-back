# Application Error Messages (English - Default)
# Format: EXCEPTION_CODE=Message text

# Authentication & Authorization Messages
AUTHENTICATION_REQUIRED=Authentication is required to access this resource.
ACCESS_DENIED=You don't have permission to perform this action.
RECIPE_AUTHOR_ONLY=Only the recipe author can modify this recipe.
INVALID_PASSWORD=Password is not valid.

# User Messages
EMAIL_ALREADY_EXISTS=Email already exists.
EMAIL_NOT_FOUND=Email not found.
USERNAME_ALREADY_EXISTS=Username already exists.
USER_NOT_FOUND=User ''{0}'' not found.

# Recipe Messages
RECIPE_NOT_FOUND_BY_ID=The recipe (id :: {0}) couldn't be found.
RECIPE_NOT_FOUND_BY_NAME=The recipe (name :: {0}) couldn't be found.
DAILY_RECIPE_NOT_FOUND=Daily recipe couldn't be found

# Product Messages
PRODUCT_NOT_FOUND_BY_ID=The product (id :: {0}) couldn't be found.
PRODUCT_NOT_FOUND_BY_NAME=The product (name :: {0}) couldn't be found.

