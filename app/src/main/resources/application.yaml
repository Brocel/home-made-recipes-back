spring:
  application:
    name: home-made-recipes-back

  security:
    # OAuth2 configuration - NOT YET IMPLEMENTED
    # Status: Pending architectural decisions on OAuth2 provider strategy
    # TODO: Configure OAuth2 client credentials when provider is selected
    # See: .github/generated/OAUTH2_IMPLEMENTATION_ROADMAP.md (when created)
    oauth2:

  jackson:
    serialization:
      write-dates-as-timestamps: false

  # Default datasource for production-like setups.
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true   # useful if DB has been partially initialized
    placeholder-replacement: true

# Flyway configuration
app:
  flyway:
    locations:
      migration: classpath:db/migration
      local: classpath:db/local
  cors:
    frontend-urls: ${FRONTEND_URLS:http://localhost:4200}
    allowed-methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    allowed-headers:
      - Content-Type
      - Authorization
      - Accept
      - X-Requested-With

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
    oauth:
      # Swagger OAuth2 configuration - NOT YET IMPLEMENTED
      # These credentials are for Swagger UI OAuth flow only (not backend authentication)
      # TODO: Add OAuth2 Provider (Google, GitHub, or custom) credentials here when available
      # Format: client-id: ${OAUTH2_CLIENT_ID:placeholder}
      client-id: # PENDING: OAuth2 provider selection
      client-secret: # PENDING: OAuth2 provider credentials
      scopes: openid, profile, email
      use-pkce-with-authorization-code-grant: true
    oauth2-redirect-url: ${SWAGGER_OAUTH2_REDIRECT_URL:http://localhost:8080/swagger-ui/oauth2-redirect.html}
  packages-to-scan: com.example.hmrback.api.controller

server:
  port: 8080

logging:
  level:
    root: INFO
    org.springframework.security: INFO

admin:
  emails: ${ADMIN_EMAILS:}

jwt:
  secret-key: ${JWT_SECRET}
  expiration-minutes: 120