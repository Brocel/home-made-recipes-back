spring:
  datasource:
    url: jdbc:h2:mem:hmrdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE # In-memory H2 database for integration tests
    driver-class-name: org.h2.Driver
    username: sa
    password:

  security:
    # OAuth2 configuration - DISABLED FOR TESTING
    # Tests use JWT authentication instead of OAuth2
    # When OAuth2 is implemented, add oauth2 configuration here as needed
    oauth2: # PENDING: OAuth2 implementation

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true

  flyway:
    enabled: false

# Flyway configuration for testing
app:
  flyway:
    locations:
      migration: classpath:db/migration
      local: classpath:db/local
  cors:
    frontend-urls: http://localhost:4200
    allowed-methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    allowed-headers:
      - Content-Type
      - Authorization
      - Accept
      - X-Requested-With

logging:
  level:
    root: INFO
    org.hibernate.SQL: DEBUG
    org.springframework.security: DEBUG

jwt:
  secret-key: fake-secret-key-just-for-integration-tests-666
  expiration-minutes: 120